body:
  text: 卷一太廟頌太廟頌思皇烈祖時邁其德肇啟洪源貽燕我則我休厥成聿先厥道丕顯丕欽允時祖考綏庶邦和四宇九功備彝樂序建崇牙設璧羽六佾奏八音舉昭大孝衎妣祖念武功收純祜初學記十三於穆清廟翼翼休徵祁祁髦士厥德允升懷想成位咸奔在宮無思不若允觀厥崇矛俞新福歌漢初建國家匡九州蠻荊震服五刃三革休安不忘備武樂脩宴我賓師敬用御天永樂無憂子孫受百福常與松喬遊烝庶德莫不咸歡柔宋書樂志樂府詩集五三弩俞新福歌材官選士劍弩錯陳應桴蹈節俯仰若神綏我武烈篤我淳仁自東自西莫不來賓同上安臺新福歌武功既定庶士咸綏樂陳我廣庭式宴賓與師昭文德宣武威平九有撫民黎荷天寵延壽尸千載莫我違同上行辭新福歌神武用師士素厲仁恩廣覆猛節橫逝自古立功莫我弘大桓桓征四國爰及海裔漢國保長慶垂祚延萬世同上贈蔡子篤詩翼翼飛鸞載飛載東我友云徂言戾舊邦舫舟翩翩以泝大江蔚矣荒塗時行靡通慨我懷慕君子所同悠悠世路亂離多阻濟岱江衡邈焉異處風流雲散一別如雨人生實難願其弗與瞻望遐路允企伊佇烈烈冬日肅肅淒風潛鱗在淵歸鴈在軒苟非鴻鵰孰能飛翻雖則進慕予思罔宣瞻望東路慘愴增歎率彼江流爰逝靡期君子信誓不遷于時及子同寮生死固之何以贈行言授斯詩中心孔悼涕淚漣洏嗟爾君子如何勿思文選二十三又詩紀十五類聚三十一引阻處雨三韻初學記三引寒軒二韻贈士孫文始天降喪亂靡國不夷我暨我友自彼京師宗守盪失越用遁違遷于荊楚在漳之湄在漳之湄亦克晏處和通箎塤比德車輔既度禮義卒獲笑語庶茲永日無諐厥緒雖曰無諐時不我已同心離事乃有逝止橫此大江淹彼南汜我思弗及載坐載起惟彼南汜君子居之悠悠我心薄言慕之人亦有言靡日不思矧伊嬿婉胡不悽而晨風夕逝託與之期瞻仰王室慨其永歎良人在外誰佐天官四國方阻俾爾歸藩爾之歸藩作式下國無曰蠻裔不虔汝德慎爾所主率由嘉則龍雖勿用志亦靡忒悠悠澹澧鬱彼唐林雖則同域邈其迥深白駒遠志古人所箴允矣君子不遐厥心既往既來無密爾音文選二十三御覽百六十八詩紀十五贈文叔良翩翩者鴻率彼江濱君子于征爰聘西鄰臨此洪渚伊思梁岷爾行孔邈如何勿勤君子敬始慎爾所主謀言必賢錯說申輔延陵有作僑肸是與先民遺跡來世之矩既慎爾主亦迪知幾探情以華睹著知微視明聽聰靡事不惟董褐荷名胡寧不師眾不可蓋無尚我言梧宮致辯齊楚構患成功有要在眾思歡人之多忌掩之實難瞻彼黑水滔滔其流江漢有卷允來厥休二邦若否職汝之由緬彼行人鮮克弗留尚哉君子異于他仇人誰不勤無厚我憂惟詩作贈敢詠在舟文選二十三詩紀十五溫溫恭人稟道之極文選二零顏延之皇太子釋奠會作詩注思親詩為潘文則作思親詩為潘文則作穆穆顯妣德音徽止思齊先姑志侔姜姒躬此勞瘁鞠予小子小子之生遭世罔寧烈考勤時從之于征奄遘不造殷憂是嬰咨于靡及退守祧祊五服荒離四國分爭禍難斯逼救死於頸嗟我懷歸弗克弗逞聖善獨勞莫慰其情春秋代逝於茲九齡緬彼行路焉託予誠予誠既否委之於天庶我顯妣克保遐年亹亹惟懼心乎如懸如何不弔早世徂顛於存弗養於後弗臨遺愆在體慘痛切心形景尸立魂爽飛沈在昔蓼莪哀有餘音我之此譬憂其獨深胡寧視息以濟于今巖巖叢險則不可摧仰瞻歸雲俯聆飄回飛焉靡翼超焉靡階思若流波清似坻頹詩之作矣情以告哀章本古文苑八廣文選十五詩紀十五又類聚二十作思親詩引止姒子生寧征嬰祊八韻初學記十七作思親四言詩引止姒子生寧征嬰七韻公讌詩公讌詩昊天降豐澤百卉挺葳蕤涼風撤蒸暑清雲卻炎暉高會君子堂並坐蔭華榱嘉肴充圓方旨酒盈金罍管絃發徽音曲度清且悲合坐同所樂但愬杯行遲常聞詩人語不醉且無歸今日不極歡含情欲待誰見眷良不翅守分豈能違古人有遺言君子福所綏願我賢主人與天享巍巍克符周公業奕世不可追文選二十詩紀十五又類聚三十九引蕤暉榱罍歸巍追七韻白帖四五各引一句從軍詩五首從軍詩五首從軍有苦樂但問所從誰所從神且武焉得久勞師相公征關右赫怒震天威一舉滅獯虜再舉服羌夷西收邊地賊忽若俯拾遺陳賞越丘山酒肉踰川坻軍中多沃饒人馬皆溢肥徒行兼乘還空出有餘資拓地三千里往返一如飛歌舞入鄴城所願獲無違晝日處大朝日暮薄言歸外參時明政內不廢家私禽獸憚為犧良苗實已揮竊慕負鼎翁願厲朽鈍姿不能效沮溺相隨把鋤犁熟覽夫子詩信知所言非文選二十七樂府詩集三十二詩紀十五又魏志武帝紀注引誰師威夷遺坻肥資飛違十韻書鈔十三引飛一韻類聚五十九引誰師威肥資飛違七韻涼風厲秋節司典告詳刑我君順時發桓桓東南征泛舟蓋長川陳卒被隰坰征夫懷親戚誰能無戀情拊衿倚舟檣眷眷思鄴城哀彼東山人喟然感鸛鳴日月不安處人誰獲恆寧昔人從公旦一徂輒三齡今我神武師暫往必速平棄余親睦恩輸力竭忠貞懼無一夫用報我素餐誠夙夜自恲性思逝若抽縈將秉先登羽豈敢聽金聲文選二十七樂府詩集三十二詩紀十五又類聚五十九引刑征坰情鳴五韻從軍征遐路討彼東南夷方舟順廣川薄暮未安坻白日半西山桑梓有餘暉蟋蟀夾岸鳴孤鳥翩翩飛征夫心多懷悽愴令吾悲下船登高防草露霑我衣迴身赴床寢此愁當告誰身服干戈事豈得念所私即戎有授命茲理不可違文選二十七樂府詩集三十二詩紀十五又類聚五十九引夷坻暉飛悲五韻御覽三百二十八引衣誰私三韻朝發鄴都橋暮濟白馬津逍遙河隄上左右望我軍連舫踰萬艘帶甲千萬人率彼東南路將定一舉勳籌策運帷幄一由我聖君恨我無時謀譬諸具官臣鞠躬中堅內微畫無所陳許歷為完士一言猶敗秦我有素餐責誠愧伐檀人雖無鉛刀用庶幾奮薄身文選二十七樂府詩集三十二詩紀十五又類聚五十九引勳君臣陳秦人身七韻說文繫傳帀部師下引軍一韻悠悠涉荒路靡靡我心愁四望無煙火但見林與丘城郭生榛棘蹊徑無所由雚蒲竟廣澤葭葦夾長流日夕涼風發翩翩漂吾舟寒蟬在樹鳴鸛鵠摩天游客子多悲傷淚下不可收朝入譙郡界曠然消人憂雞鳴達四境黍稷盈原疇館宅充鄽里士女滿莊馗自非賢聖國誰能享斯休詩人美樂土雖客猶願留文選二十七樂府詩集三十二詩紀十五又類聚二十八作王粲詩廣文選九作清河作引愁丘由流收憂留七韻韻補卷引馗休二韻被羽在先登甘心除國疾文選二七王粲從軍詩注樓船凌洪波尋戈刺群虜太平御覽三五一詠史詩自古無殉死達人所共知秦穆殺三良惜哉空爾為結髮事明君受恩良不訾臨沒要之死焉得不相隨妻子當門泣兄弟哭路陲臨穴呼蒼天涕下如綆縻人生各有志終不為此移同知埋身劇心亦有所施生為百夫雄死為壯士規黃鳥作哀詩至今聲不虧文選二十一詩紀十五荊軻為燕使送者盈水濱縞素易水上涕泣不可揮韻補一揮字注雜詩日暮遊西園冀寫憂思情曲池揚素波列樹敷丹榮上有特棲鳥懷春向我鳴褰衽欲從之路險不得征徘徊不能去佇立望爾形風飆揚塵起白日忽已冥回身入空房託夢通精誠人欲天不違何懼不合并文選二十九詩紀十五又類聚二十八作王粲詩引情榮鳴三韻雜詩四首吉日簡清時從君出西園方軌策良馬並驅厲中原北臨清漳水西看柏楊山回翔遊廣囿逍遙波水間類聚二十八章本古文苑八廣文選十五詩紀十五列車息眾駕相伴綠水湄幽蘭吐芳烈芙蓉發紅暉百鳥何繽翻振翼群相追投網引潛魚強弩下高飛白日已西邁歡樂忽忘歸類聚二十八章本古文苑八廣文選九又廣文選十五詩紀十五聯翻飛鸞鳥獨遊無所因毛羽照野草哀鳴入層雲我尚假羽翼飛睹爾形身願及春陽會交頸遘殷勤類聚九十章本古文苑八廣文選十五詩紀十五鷙鳥化為鳩遠竄江漢邊遭遇風雲會託身鸞鳳間天姿既否戾受性又不閑邂逅見逼迫俛仰不得言類聚九十二章本古文苑八廣文選十五詩紀十五七哀詩三首西京亂無象豺虎方遘患復棄中國去委身適荊蠻親戚對我悲朋友相追攀出門無所見白骨蔽平原路有飢婦人抱子棄草間顧聞號泣聲揮涕獨不還未知身死處何能兩相完驅馬棄之去不忍聽此言南登霸陵岸回首望長安悟彼下泉人喟然傷心肝文選三十二文章正宗二十九詩紀十五又宋書謝靈運傳論水經注渭水注文選二十二古意詶到溉登琅邪城詩注寰宇記二十五各引安一韻南史謝晦傳引安肝二韻藝文類聚三十四引患蠻攀原安肝六韻韻補卷引完言二韻黃氏集千家注杜工部詩史補遺四通泉詩注引患荊二韻又草堂詩箋二十將適詩注引患蠻二韻荊蠻非我鄉何為久滯淫方舟泝大江日暮愁我心山崗有餘映巖阿增重陰狐狸馳赴穴飛鳥翔故林流波激清響猴猿臨岸吟迅風拂裳袂白露沾衣襟獨夜不能寐攝衣起撫琴絲桐感人情為我發悲音羈旅無終極憂思壯難任文選二十三詩紀十五又書鈔百五十八引陰林二韻類聚三十四引淫心陰吟琴音六韻御覽七百七十引心一韻邊城使心悲昔吾親更之冰雪截肌膚風飄無止期百里不見人草木誰當遲登城望亭隧翩翩飛戍旗行者不顧反出門與家辭子弟多俘虜哭泣無已時天下盡樂土何為久留茲蓼蟲不知辛去來勿與諮章本古文苑八詩紀十五
