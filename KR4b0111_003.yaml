body:
  text: 卷三七釋潛虛丈人違世遁俗恬淡清玄渾沌淳朴薄禮愚學無為無欲均同死生混齊榮辱不拔毛以利物不拯溺以濡足濯身乎滄浪振衣乎嵩嶽于是文藉大夫聞而歎曰於呼聖人居上國無室士人之不訓在列之恥我其釋諸弗革乃已遂造丈人而謁之曰蓋聞君子不以仕易道不以身後時進德修業與世同理一物有蔽大人恥之今子深藏其身高栖其志外無所營內無所事有目而不視有心而不思顒若窮川之魚梢若稿木之枝鄙夫惑焉請為子言大倫敘時務宣導情性啓授達趣雖謬雅旨殆其有助抑可陳乎丈人曰可哉藝文類聚五十七大夫曰道在養志志在實氣將定其氣莫先五味書鈔一百四十二凍縹玄酎醴白腐清書鈔一百四十八肴以多品羞以珍名脯鮪桂蠹石夔瓊晶鱉寒鮑熱異和殊馨同上紫梨黃甘夏奈冬橘枇杷都柘龍眼荼實河隈之鮇泗濱盧鱖名工砥鍔因皮卻切纖而不茹紛若紅綷乃有西遊梁御宿青粲瓜州紅䵂參糅相半軟滑膏潤入口流散書鈔一百四十二又一百四十四初學記二十六御覽八百五十黿羹蠵臛晨鳧宿鷃五黃搗珍腸胹肺爛書鈔一百四十二旄象葉解胎豹臠斷霜熊之掌文鹿之茸書鈔一百四十二齊以甘酸隨時代獻芬芳滋液方丈兼案此五味之極也子其饗諸丈人曰否膏粱雖旨厚味臘毒子之所甘於我為戚大夫曰名都之會土勢敞麗乃營顯宇極茲弘侈重殿崛起疊搆復施欒栭錯峙飛抑四刺結棟舒宇翼若鳥企雲枌虹帶華桷鏤楹綺寮頳幹芙蓉披英文軒雕楯承以拘櫺雲幄垂羽山根紫莖高門洞開闈闥四通陰陽殊制溫涼異容班輸之徒致巧展功土畫黼繡木刻虬龍幽房廣室密牖疏窗閭術相關閨巷錯重窈窕遷化莫識所從爾乃層臺特起隆崇嵯峨戴甗反宇參差相加屬延閣以承梠表曲觀於四阿徑園囿而外折臨寒泉之激波清沼淡淡列植菱荷芳卉奇草垂葉布柯竹木叢生珍果駢羅青蔥幽藹含實吐華孕鱗群躍衆鳥喧訛熙春風而廣望恣心目之所嘉此宮室之美也子其宅諸丈人曰否水土交勝是謂殃神子之所安我則未聞大夫曰邯鄲才女三齊巧士名唱祕舞承間並理七盤陳于廣庭疇人儼其齊俟坐二八於後行盛容飾而遞起揄皓袖以振策竦并足而軒跱邪睨鼓下伉音赴節清歌流響依違繞結安翹足以徐擊馺頓身而傾折揚蛾眉而順止儀間暇以超絶飆駭機發雜沓遄促投身放迹邀聲受曲便娟婉娩紛綸連屬忽捐桴而揮袂聊徘徊以容與坐列雜其俱興遂駢進而連武轉騰浮蹀逐激和柎足不空頓手不徒舉仆似崩崖起若飛羽翩飄微霍亂精蕩神巴渝代起鞞鐸響振藝文類聚五十七文選文賦注又舞賦注羽旄奮麾奕奕紛紛於是白日西移轉即間堂號鐘絙瑟列乎洞房管簫繁會雜以笙簧夔牙之師呈能極方奏白雪之高均弄幽徵與反商聲流暢以清哇時慷慨而激揚虞公含詠陳惠清微新聲變詞慘悽增悲聽者動容梁塵為飛此音樂之至也子其聽諸丈人曰否淫聲慆心心放生害我之所畏惟此為大大夫曰農功既登玄陰戒寒鳥獸鳩萃川濱涸乾乃致衆庶大獵中原植旌拊表班授行曲絙網連罝彌山跨谷輕車布於平陸選騎陳於林足散蒸徒以成圍漫雲興而相屬鼓鳴旗動雷發飆逝流鋒四射畢罕橫厲奮千芟而稍繫弛鷹犬以搏噬羽毛群駭喪魂失勢飛遇矰矢走逢遮例中創被痛金夷木斃俯仰翕響所獲無藝於是剛禽狡獸驚厈跋扈突圍負阻莫能嬰禦乃使晉馮魯卞注其贔怒徒摶熊豹袒暴兕武頓犀掎象破脰裂股當足遇手摧為四五若夫輕材高足光飛電去踵奔逸之散迹荷良弓而長驅淩原隰以升降捷蹊徑而邀遇弦不虛控矢不徒注僵禽連積隕鳥若雨藝文類聚五十七御覽三百五十三紛紛藉藉蔽野被原含血之蟲莫不畢殫罷圍陳饗旋旆回轅從容四郊棲遲圃園娛遊往來唯意所安此遊獵之娛也子其從諸丈人曰否是於道忌實曰心狂聞子屢誨彌失所望大夫曰麗才美色希世特立都治間靡窈窕娥娙豐膚曼肌弱骨纖形鬒髮玄鬢修項秀頸紅顏熙曜曄若苕榮西施之疇莫之與呈盛容象而致飾昭令質之豔姿戴明中之羽雀離華錜之葳蕤珥照夜之雙璫煥煜爚以垂暉書鈔一百三十六藝文類聚五十七襲藻繡之縟彩振纖縠之袿徽紛綢繆而雜錯忽猗靡以依徽於是釋服墮容微施的黛承間嬿御攜手同戴和心善性柔顏婥態便妍姆媚不可忍耐一顧忤精傾城莫悔此美色之選也子其悅諸於是丈人心疾意忘氣怒外淩赩然作色謐爾弗應大夫曰觀海然後知江河之淺登嶽然後見丘陵之狹君子志乎其大小人玩乎所狎昔在神聖繼天垂業指象畫卦陳疇敘法經緯庶典作謨來葉天人之事靡不備浹乃有應期睿達之師開方敏學之友朋徒自遠童冠八九觀禮杞宋講誨曲阜浴乎沂洙之上風乎舞雩之右棲遲誦詠同車攜手論載籍敘彝倫度八索考三墳升堂入室溫故知新上不為悠悠苟進下不與鳥獸同群近不逼俗遠不違親從容中和與時屈申煥然順敘粲乎有文子曾此之弗欲而猶遂彼所遵不以過乎於是丈人變容降色而應曰夫言有殊而感心行有乖而悟事大夫斯誨實誘我志道若存亡請獲容思大夫曰聖人在位時邁其德先天弗違稽若古則睿哲文明允恭玄塞旁施業業勤釐萬機闡幽揚陋博采疇咨登俊乂于壟畝舉賢才于仄微置彼周行列于邦畿九德咸事百僚師師乃建雍宮立明堂考憲度修舊章綴故訓之紀綜六藝之綱下理九土上步三光制禮作樂班敘等分明恤庶獄詳刑淑問百揆無廢五品克順形中情於俎豆宣德教於四邦布休風以偃物馳純化而玄通于是四海之內咸變時雍仁澤洽於心義氣蕩其胸父慈子孝長惠幼恭推畔讓路重信貴公五辟偃措囹圉闃空普天率土比屋可封聲暨海外和充天宇越裳重譯而來獻肅慎納貢於王府日月重光五徵時敘嘉生繁殖祥瑞蔽野是以棲林隱谷之夫逸迹放言之士鑒乎有道貧賤是恥藝文類聚五十七踊躍泉田之間莫不載贄而興起於是丈人踧然動顏乃歎而稱曰美哉言乎吾聞辭不必繁以義為貴道苟不同聽言則醉子之前論多違德類槃遊耽色美室侈味薰心慆耳俾我戚悴既獲改誨踰以學林師友玄穆我固有心況乃聖人之至化大道之上功嘉言聞耳廓若發蒙老夫雖蔽庶能斯通敬抱衣冠以及後蹤靈壽杖頌茲杖靈木以介眉壽奇幹貞正不待矯輮據貞斯直杖之爰茂藝文類聚六十九正考父讚恂恂正父應德孔盛身為國卿族則公姓年在耆耋三葉聞政誰能不怠申慈約敬饘粥豫口傴僂受命名書金鼎祚及後聖初學記十七反金人讚君子亮直行不柔辟友賤不恥誨焉是益我能發蹤彼用遠迹一言之賜過乎璵璧末世不敦義與茲易而言匪忠退有其謫藝文類聚十九難鍾荀太平論聖莫盛于堯而洪水方割丹朱淫虐四族凶佞矣帝舜因之而三苗畔戾矣禹又因而防風為戮矣此三聖古之所大稱也繼踵相承且二百年而刑罰未嘗一世而乏也然則此三聖能平三聖能平則何世能致之乎孔子稱曰唯上智與下愚不移不移者丹朱四凶三苗之謂也當紂之世殷罔不小大好草竊姦宄周公遷殷頑民于洛邑其下愚之人必有之矣周公之于三聖不能踰也三聖有所不化矣有所不移矣周公之不能化殷之頑民所可知也苟不可移必或犯罪罪而弗刑是失所也犯而刑之刑不可錯矣孟軻有言盡信書不如無書有大而言之者刑錯之屬也豈億兆之民歷數十年而無一人犯罪一物失所哉謂之無者盡信書之謂也藝文類聚十一爵論依律有奪爵之法此謂古者爵行之時民賜爵則喜奪爵則懼故可以奪賜而法也今爵事廢矣民不知爵者何也奪之民亦不懼賜之民亦不喜是空設文書而無用也今誠循爵則上下不失實而功勞者勸得古之道合漢之法以貨財為賞者不可供以復除為賞者租稅損減以爵為賞者民勸而費省故古人重爵也藝文類聚五十一爵自一級轉登十級而為列侯譬猶秩自百石轉遷而至于公也而近世賞人者皆不由等級從無爵封為列侯原其所以爵廢故也司馬法曰賞不踰時欲民速觀為善之利也近世爵廢人有小功無以賞也乃積纍焉須事足乃封侯非所以速為而及時也上觀古比高祖封功臣及白起衛鞅皆稍賜爵為五大夫客卿庶長以至于侯非一頓而封也夫稍稍賜爵與功大小相稱而俱登既得其義且侯次有緒使慕進者逐之不倦矣御覽百九十八儒吏論士同風于朝農同業于野雖官職務殊地氣異宜然其致功成利未有相害而不通者也古者八歲入小學學六甲五方書計之事十五入大學學君臣朝廷王事之紀則文法典藝具存于此矣至乎末世則不然矣執法之吏不窺先王之典搢紳之儒不通律令之要彼刀筆之吏豈生而察刻哉起于几案之下長于官曹之間無溫裕文雅以自潤雖欲無察刻弗能得矣竹帛之儒豈生而迂緩也起于講堂之上遊于鄉校之中無嚴猛斷割以自裁雖欲不迂緩弗能得矣先王見其如此也是以博陳其教輔和民性達其所壅袪其所蔽吏服訓雅儒通文法故能寬猛相濟剛柔自克也藝文類聚五十二御覽六百十三三輔論湘潛先生江濱逸老將集論雲夢玄公豫焉先生稱曰蓋聞戎不可動兵不可揚今劉牧建德垂芳名烈既彰矣曷乃稱兵舉衆殘我波靈逸老曰是何言與天生五材金作明威長沙不軌敢作亂違我牧覩其然乃赫爾發憤且上征下戰去暴舉順州牧之兵建拂天之旌鳴振地之鼓玄胄曜日犀甲如堵以此衆戰孰能嬰御劉牧之懿子又未聞乎履道懷智休迹顯光灑掃群虜艾撥穢荒走袁術于西境馘射貢乎武當遏孫堅于漢南追揚定于折商藝文類聚五十九安身論蓋崇德莫盛乎安身安身莫大乎存政存政莫重乎無私無私莫深乎寡欲是以君子安其身而後動易其心而後語定其交而後求篤其志而後行然則動者吉凶之端也語者榮辱之主也求者利病之幾也行者安危之決也故君子不妄動也必適于道不徒語也必經于理不苟求也必造于義不虛行也必由于正夫然用能免或擊之凶厚自天之佑故身不安則殆言不順則悖交不審則惑行不篤則危四者存乎中則患憂接乎外矣憂患之接必生于自私而興于有欲自私者不能成其私有欲者不能濟其欲理之至也藝文類聚二三晉書潘尼傳務本論古者之理國也以本為務八政之于民也以食為首是以黎民時雍降福孔皆也故仰司星辰以審其時俯耕籍田以率其力封祀農稷以神其事祈穀報年以寵其功設農師以監之置田畯以董之黍稷茂則喜而受賞田不墾則怒而加罰都不得有遊民室不得有懸耜野積踰冬奪者無罪場功過限竊者不刑所以競之于閉藏也先王籍田以力任力以夫議其老幼度其遠近種有常時耘有常節收有常期此賞罰之本種不當時耘不及節收不應期者必加其罰苗實踰等必加其賞也農益地辟則吏受大賞也農損地狹則吏受重罰夫火之災人也甚于怠農慎火之力也輕于秬耘通邑大都有嚴令則火稀無嚴令則燒者數非賞罰不能濟也藝文類聚六十五末世之吏負青幡而布春令有勸農之名無賞罰之實北堂書鈔一二零七七一五四吏不徇功民不私力北堂書鈔二七荊州文學記官志荊州文學記官志有漢荊州牧曰劉君稽古若時將紹厥績乃稱曰於先王之為世也則象天地軌儀憲極設教導化敘經志業用建壅泮焉立師保焉作為禮樂以節其性表陳載籍以持其德上知所以臨下下知所以事上官不失守民聽無悖然後太階平焉故曰物生而蒙事屯而養天造莫昧屯而養之利有攸適猶金之銷爐水之從器也是以聖人實之於文鑄之於學夫文學也者人倫之守大教之本也乃命五業從事宋衷所作文學延朋徒焉宣德音以贊之降嘉禮以勸之五載之間道化大行耆德故老綦母闔等負書荷器自遠而至者三百有餘人于是童幼猛進武人革面總角佩觿委介免胄比肩繼踵川逝泉涌亹亹如也兢兢如也遂訓六經講禮物諧八音協律呂修紀歷理刑法六路咸秩百氏備矣天降純嘏有所底授臻于我君受命既茂南牧是建荊衡作守時邁淳德宣其丕繇厥繇伊何四國交阻乃赫斯威爰整其旅虔夷不若屢戡寇侮誕啓洪軌敦崇聖緒典墳既章禮樂咸舉濟濟搢紳盛茲階宇祁祁髦俊亦集爰處和化普暢休徵時敘品物宣育百穀繁蕪勳格皇穹聲被四宇藝文類聚三十八御覽六百八倣連珠倣連珠臣聞明主之舉也不待近習聖君用人不拘毀譽故呂尚一見而為師陳平烏集而為輔臣聞記功志過君臣之道也不念舊惡賢人之業也是以齊用管仲而霸功立秦任孟明而晉恥雪臣聞振鷺雖材非六翮無以翔四海帝王雖賢非良臣無以濟天下臣聞觀于明鏡則疵瑕不滯于軀聽于直言則過行不纍乎身藝文類聚五十七蕤賓鐘銘并序蕤賓鐘銘并序蕤賓鐘建安二十一年九月十七日作重二千百八鈞十有二斤北堂書鈔一零八有魏匡國誕成天功底綏六合纂定庶邦承民靡戾休徵惟同皇命孔昭造茲衡鐘紀之以三平之以六度量允嘉氣齊允淑表聲韶和民聽以睦時作蕤賓永享遐福古文苑一三章樵引無射鐘銘并序無射鐘銘并序無射鐘建安二十一年九月十七日作重三千五十鈞有八斤北堂書鈔一零八有魏匡國成功允章格于上下光于四方休徵時序民説時康造茲衡鍾有命自皇三以紀之六以平之厥量孔嘉厥齊孔時音聲和協民德同熙聽之無射用以啓期初學記十六硯銘昔在皇頡爰初書契以代結繩民察官理庶績誕興在世季末華藻流淫文不寫行書不盡心淳朴澆散俗以崩沈墨運翰染榮辱是若念茲在茲惟玄是宅藝文類聚五十八初學記二十一刀銘侍中關內侯臣粲言奉命作刀銘及示以其敘二報誠必朝氏之刀而張常為工矣輒思作銘謹奉陋不足覽相時陰陽制茲利兵和諸色劑考諸濁清灌襞以數質象以呈附反載穎舒中錯形陸剸犀兕水截鯢鯨君子服之式章威靈無曰不虞戒不在明藝文類聚六十文選七命注初學記二十二御覽三百四十六弔夷齊文歲旻秋之仲月從王師以南征濟河津而長驅踰芒阜之崢嶸覽首陽于東隅見孤竹之遺靈心於悒而感懷意惆悵而不平望壇宇而遙弔抑悲古之幽情知養老之可歸忘除暴之為念潔己躬以騁志愆聖哲之大倫忘舊惡而希古退採薇以窮居守聖人之清概要既死而不渝厲清風于貪士立果志于懦夫到于今而見稱為作者之表符雖不同于大道合尼父之所譽藝文類聚三十七
