body:
  text: 附録贈楊德祖贈楊德祖我君餞之其樂泄泄顏氏家訓文章篇失題詩失題詩探懷授所歡願醉不顧身文選二五謝靈運還舊園作見顏范二中書詩注又長夜何宴宴九家集注杜詩五遣興五首其四注又散策高堂上九家集注杜詩一三鄭典設自施州歸師尹注又盜賊如豺狼分門集注杜工部詩三晝夢趙次公注詩詩哀笑動梁塵急觴蕩幽默草堂詩箋九蘇端詩注又海録碎事六引下句彈碁賦彈碁賦文石為局金碧齊精隆中夷外緻理肌平卑高得適既安且貞碁則象齒選乎南藩禮身重腹隱頭鶱驍悍説敏不輕不軒列數二六取象官軍微章采列爛焉可觀於是二物既設主人延賓粉石霧散六師列陳迹行王首左右相親成列告誓三令五申事中軍政言含禮文號令既通兵碁啓路運若回飆疾似飛兔前中卻舞賈其餘怒風馳火燎令牟取五恍哉忽兮誠足慕也若夫氣竭力殘弱膽怯心進不及敵中路為擒仁而不武春秋所針剛優徑勇忿速輕急推敵阻隧我廢彼立君子去是過猶不及藝文類聚七四太平御覽七五五征思賦征思賦在建安之二八星步次於箕維文選四六顏延之三月三日曲水詩序注鐘虡銘鐘虡銘惟魏四年歲在丙申龍次大火五月丙寅作蕤賓鐘又作無射鍾建安二十一年七月始設鍾虡於文昌殿前所以朝會四方也文選六左思魏都賦劉逵注阮元瑜誄阮元瑜誄既登宰朝充我祕府允司文章爰及軍旅庶績維殷簡書如雨強力成敏事至則舉北堂書鈔一零三尚書問尚書問王粲稱伊洛已東淮漢之北康成一人而已莫不宗焉咸云先儒多闕鄭氏道備粲竊嗟怪因求其學得尚書注退而思之以盡其意意皆盡矣所疑之者猶未喻焉舊唐書元行沖傳載釋疑失題文失題文胡越之異區分門集注杜工部詩一苦雨奉寄隴西公兼呈王徵士趙次公注英雄記曹操曹操與劉備密言備泄之於袁紹紹知操有圖己之意操自咋其舌流血以失言戒後世藝文十七又御覽三百六十七建安中曹操於南皮攻袁談斬之操作鼓吹自稱萬歲於馬上舞十二年攻烏桓踏頓一戰斬踏頓首繫馬鞍於馬抃舞御覽五百七十四又水經大遼水注引曹操於是擊馬鞍於馬上作十片語有脫誤曹操進軍至江上欲從赤壁渡江無船作竹椑使部曲乘之從漢水來下大江注浦口未即渡周瑜又夜密使輕舸百艘燒椑操乃夜走御覽七百七十一曹公赤壁之敗至雲夢大澤遇大霧迷道書鈔一百五十一又初學記卷引無之字至作行澤下有中字迷道作迷失道路建安七年鄴中大飢米一斛二萬錢御覽三十五曹純純字子和年十四而喪父與同産兄仁別居承父業富於財僮僕人客以百數純綱紀督御不失其理鄉里咸以為能好學問敬愛學士學士多歸焉由是為遠近所稱年十八為黃門侍郎二十從太祖到襄邑募兵遂常從征戰魏志曹仁傳注又藝文四十八引曹純字子和年十六為黃門侍郎又御覽二百二十一引同藝文又三百八十四引曹純字子和年十四喪父業富於財使人僮僕以百數純綱紀督御之不失其理好樂學問愛敬學士學士多歸焉由是為遠近所稱年十六為黃門郎案太祖二字係後人所改粲時不得稱太祖當稱曹公周毖伍瓊毖字仲遠武威人瓊字德瑜汝南人魏志董卓傳注又後漢書董卓傳注無汝南人三字橋瑁瑁字元偉玄族子先為兗州刺史甚有威惠魏志武帝紀注又後漢書袁紹傳注引瑁上玄上並有橋字董卓卓父君雅由微官為潁川綸氏尉有三子長子擢字孟高早卒次即卓卓弟旻字叔潁魏志董卓傳注卓數討羌胡前後百餘戰同上河南中部椽閔貢扶帝及陳留王上至雒舍止帝獨乘一馬陳留王與貢共乘一馬從雒舍南行公卿百官奉迎於北芒阪下故太尉崔烈在前導卓將步騎數千來迎烈呵使避卓罵烈曰晝夜三百里來何云避我不能斷卿頭邪前見帝曰階下令常侍小黃門作亂乃爾以取禍敗為負不小邪又趨陳留王曰我董卓也從我抱來乃於貢抱中取王同上下又注云英雄記曰一本云王不就卓抱卓與王併馬而行也董卓謂王允曰欲得一快司隸校尉誰可作者允曰唯有蓋勳元周京兆耳卓曰此明智有餘不可假以雄職御覽二百五十董卓攻得李昊張安畢圭苑中生烹之二人臨入鼎相謂曰不同日生乃同日烹御覽六百四十五董卓在顯陽苑請官僚共議欲有廢立謂袁紹曰劉氏之種不足復遺袁紹曰漢家君天下四百許年恩澤深渥兆民戴之恐衆不從公議卓曰天下之事豈不在我我令為之誰敢不從紹曰天下健者不唯董公紹請立觀之橫刀長揖而去坐中皆驚愕時卓新至見紹大家故不敢害之後漢書袁紹傳注引紹揖卓去坐中驚愕卓新至見紹大家故不敢害卓於是遂策廢皇太后遷之永安宮其夜崩廢皇帝史侯為宏農王立陳留王為皇帝卓聞東方州郡謀欲舉兵恐其以宏農王為主乃置王閣上薦之以棘召王太傅責問之曰宏農王病困何故不白遂遣兵迫守太醫致藥即日宏農王及妃唐氏皆薨御覽九十二卓侍妾懷抱中子皆封侯弄以金紫孫女名白時尚未笄封為渭陽君於郿城東起壇從廣二丈餘高五六尺使白乘軒金華青蓋車都尉中郎將刺史二千石在郿者各令乘軒簪筆為白導從之壇上使兄子璜為使者授印綬魏志董卓傳注又御覽二百二引董卓孫女名白於郿城下無東字白乘下無軒字末有也字郿去長安二百六十里同上時有謠言曰千里草何青青十日卜猶不生又作董逃之歌又有道士書布為呂字以示卓卓不知其為呂布也卓當入會陳列步騎自營至宮朝服導引其中馬躓不前卓心怪欲止布勸使行乃衷甲而入卓既死當時日月清淨微風不起旻璜等及宗族老弱悉在郿皆還為其群下所斫射卓母年九十走至塢門曰乞脫我死即斬首袁氏門生故吏改殯諸袁死於郿者斂聚董氏尸於其側而焚之暴卓尸於市卓素肥膏流浸地草為之丹守尸吏暝以為大炷置卓臍中以為燈光明達旦如是積日後卓故部曲收所燒者灰并以一棺棺之葬於郿卓塢中金有二三萬斤銀八九萬斤珠玉錦綺奇玩雜物皆山崇阜積不可知數魏志董卓傳注又後漢書董卓傳注引作有道士書布以為呂字將以示卓卓不知其為呂布也又引卓母年九十走至塢門曰乞脫我死即時斬首又藝文八十三引董卓郿塢有金二三萬斤御覽八百十一事類賦金引同御覽並無郿字昔大人見臨洮而銅人鑄臨洮生卓而銅人毀世有卓而大亂作大亂作而卓身滅抑有以也魏志董卓論注京師謠歌咸言河臘叢進獻帝臘日生也風俗通曰烏臘烏臘案逆臣董卓滔天虐民窮凶極惡關東舉兵欲共誅之轉相顧望莫肯先進處處停兵數十萬若烏臘蟲相隨橫取之矣後漢書五行志一注太祖作董卓歌辭云德行不虧缺變故自難常鄭康成行酒伏地氣絶郭景圖命盡於園桑魏志袁紹傳注按歌辭不合董卓疑有誤何苗苗太后之同母兄先嫁朱氏之子進部曲將吳匡素怨苗不與進同心又疑其與宦官通謀乃令軍中曰殺大將軍者車騎也遂引兵與卓弟旻共攻殺苗於朱爵闕下魏志董卓傳注卓欲震威侍御史擾龍宗詣卓白事不解劍立撾殺之京師震動發何苗棺出其尸枝解節棄於道邊又收苗母舞陽君殺之棄尸於苑枳落中不復收斂同上李傕郭汜傕北地人汜張掖人一名多魏志董卓傳注又後漢書董卓傳注引傕北地人李傕等相攻戰長安中盜賊不禁白日虜掠是時穀一斛五十萬豆麥二萬人相食啖白骨委積臭穢滿路御覽三十五又書鈔一百五十六陳禹謨補引李傕至人相食楊奉韓暹備誘奉與相見因於坐上執之暹失奉勢孤時欲走還并州為杼秋屯帥張宣所邀殺魏志董卓傳注丁原原子建陽本出自寒家為人粗略有武勇善騎射為南縣吏受使不辭難有警急追寇虜輒在其前裁知書少有吏用魏志呂布傳注又後漢書董卓傳注引至輒在前止無本出自寒家句勇上無武字射上無騎字無為南縣吏四字辭下無難字無末七字呂布郭汜在城北布開城門將兵就汜言且卻兵但身決勝負汜布乃獨共對戰布以矛刺中汜汜後騎遂前救汜汜布遂各兩罷魏志呂布傳注諸書布以四月二十三日殺卓六月一日敗走時又無閏不及六旬同上呂布刺殺董卓與李傕戰敗乃將數百騎以卓頭繫馬鞍走出武關御覽三百五十八王允誅董卓卓部將李傕郭汜不自安遂合謀攻圍長安城陷呂布奔走布駐馬青璅門外招允曰公可以去乎允曰若國家社稷之靈上安國家吾之願也如其不獲則奉身以死之御覽四百十七布自以有功於袁氏輕傲紹下諸將以為擅相署置不足貴也布求還洛紹假布司隸校尉外言當遣內欲殺布明日當發紹遣甲士三十人辭以送布布使止於帳側偽使人於帳中鼓箏紹兵臥布無何出帳去而兵不覺夜半兵起亂砍布床被謂為已死明日紹訊問知布尚在乃閉城門布遂引去魏志呂布傳注又後漢書臧洪傳注引自布求還洛止於帳側上無布使二字床下無被字謂下無為字明日作明旦呂布詣袁紹紹患布欲殺之遣三十六兵被鎧迎布使著帳邊臥布知之使於帳中鼓箏諸兵臥布出帳去兵不覺也藝文四十四按與魏志呂布傳注後漢書臧洪傳注所引不同呂布詣袁紹紹患之布不自安因求還洛陽紹聽之承制使領校尉遣壯士送布而陰殺之布疑其圖己乃使人鼓箏於帳中潛自遁去夜中兵起而布已亡紹聞懼為患募追之皆莫敢近遂復歸御覽五百七十六按所引又與藝文各別布見備甚敬之謂備曰我與卿同邊地人也布見關東起兵欲誅董卓布殺卓東出關東諸將無安布者皆欲殺布耳請備於帳中坐婦床上令婦向拜酌酒飲食名備為弟備見布語言無常外然之而內不悅魏志張邈傳注布初入徐州書與袁術術報書曰昔董卓作亂破壇王室禍害術門戶術舉兵關東未能屠裂卓將軍誅卓送其頭首為術掃滅讎恥使術明目於當世死生不愧其功一也昔將金元休向兗州甫詣封丘為曹操逆所拒破流離迸走幾至滅亡將軍破袞州術復明目於遐邇其功二也術生年以來不聞天下有劉備備乃舉兵與術對戰術憑將軍威靈得以破備其功三也將軍有三大功在術術雖不敏奉以生死將軍連年攻戰軍糧苦少今送米二十萬斛迎逢道路非直此止當駱驛復致若兵器戰具他所乏少大小唯命布得書大喜遂造下邳魏志張邈傳注布水陸東下軍到下邳西四十里備中郎將丹陽許耽夜遣司馬章誑來詣布言張益德與下邳相曹豹共爭益德殺豹城中大亂不相信丹陽兵有千人屯西白門城城內聞將軍來東大小踴躍如復更生將軍兵向城西門丹陽軍便開門內將軍矣布遂夜進晨到城下天明丹陽兵悉開門內布兵布於門上坐步騎放火大破益德兵獲備妻子軍資及部曲將吏士家口同上建安元年六月夜半時布將河內郝萌反將兵入布所治下邳府詣廳事閣外同聲大呼攻閣閣堅不得入布不知反者為誰直牽婦科頭袒衣相將從溷上排壁出詣都督高順營直排順門入順問將軍有所隱不布言河內兒聲順言此郝萌也順即嚴兵入府弓弩並射萌衆萌衆亂走天明還故營萌將曹性反萌與對戰萌刺傷性性砍萌一臂順砍萌首床輿性送詣布布問性言萌受袁術謀謀者悉誰性言陳宮同謀時宮在坐上面赤旁人悉覺之布以宮大將不問也性言萌常以此問性言呂將軍大將有神不可擊也不意萌狂惑不止布謂性曰卿健兒也善養視之創愈使安撫萌故營領其衆同上初天子在河東有手筆版書召布來迎布軍無畜積不能自致遣使上書朝廷以布為平東將軍封平陶侯使人於山陽界亡失文字太祖又手書厚加慰勞布説起迎天子當平定天下意并詔書購捕公孫瓚袁術韓暹揚奉等布大喜復遣使上書於天子曰臣本當迎大駕知曹操忠孝奉迎都許臣前與操交兵今操保傅陛下臣為外將欲以兵自隨恐有嫌疑是以待罪徐州進退未敢自寧答太祖曰布獲罪之人分為誅首手命慰勞厚見褒獎重見購捕袁術等詔書布當以命為效太祖更遣奉車都尉王則為使者齎詔書又封平東將軍印綬來拜布太祖又手書與布曰山陽屯送將軍所失大封國家無好金孤自取家好金更相為作印國家無紫綬自取所帶紫綬以籍心將軍所使不良袁術稱天子將軍止之而使不通章朝廷信將軍使復重上以相明忠誠布乃遣登奉章謝恩并以一好綬答太祖同上布令韓暹楊奉取劉備地麥以為軍資御覽八百三十八呂布字奉光劉備屯小沛袁術遣將紀靈率步騎三萬攻劉備備求救於布布率騎千餘馳赴之遣人招備並請靈等饗飲謂靈曰布性不喜合鬭但喜解鬭耳乃令植戟於營門彎弓曰諸君觀布射戟小支中者當解兵不中留決鬭布一發中戟支遂罷兵御覽七百四十六又書鈔一百二十四劉備屯小沛袁術遣將紀靈攻備呂布曰布不善合鬭但喜解鬭耳令門侯於營門中舉一隻戟布言諸君觀布射戟小支一發中者諸軍當解去不中者可留決鬭布舉弓射戟正中小支布後又與暹奉二軍向壽春水陸並進所過虜略到鍾離大獲而還既渡淮北留書與術曰足下恃軍強盛常言猛將武士欲相吞滅每抑止之耳布雖無勇虎步淮南一時之間足下鼠竄壽春無出頭者猛將武士為悉何在足下喜為大言以誣天下天下之言安可盡誣古者兵交使在其間造策者非布先唱也相去不遠可復相聞布渡畢術自將步騎五千揚兵淮上布騎皆於水北大咍笑之而還時有東海蕭建為琅邪相治莒保城自守不與布通布與建書曰天下舉兵本以誅董卓耳布殺卓來詣關東欲求兵西迎大駕光復洛京諸將自還相攻莫肯念國布五原人也去徐州五千餘里乃在天西北角今不來共爭天東南之地莒與下邳相去不遠宜當共通君如自遂以為郡郡作帝縣縣自王也昔樂毅攻齊呼吸下齊七十餘城唯莒即墨二城不下所以然者中有田單故也布雖非樂毅君亦非田單可取布書與智者詳共議之建得書即遣主簿齎箋上禮貢良馬五匹建尋為臧霸所襲破得建資實布聞之自將步騎向莒高順諫曰將軍躬殺董卓威震夷狄端坐顧盼遠近自然畏服不宜輕自出車如或不捷損名非小布不從霸畏布抄暴果登城拒守布不能拔引還下邳霸後復與布和魏志張邈傳注呂布將兵向莒臧霸等畏布登城上以藥箭亂射中人馬布不能拔引還下邳書鈔一百二十五陳禹謨補呂布使陳登詣曹操求徐州牧不得登還布怒拔戟斫朹曰吾所求無獲但為卿父子所賣耳登不為動容徐對曰登見曹公言養將軍譬如養虎當飽其肉不飽則將嗜人公曰不如卿言譬如養鷹飢則為用飽則揚去其言如此布意乃解御覽三百五十二又書鈔一百二十四陳禹謨補引呂布使陳登詣曹操求徐州牧不得登還布怒拔戟斫几曰卿父勸吾協同曹公絶婚公路今吾所求無一獲而卿父子並顯重但為卿所賣耳布遣許汜王楷告急於術術曰布不與我女理當自敗何為復來相聞邪汜楷曰明上今不救布為自敗耳布破明上亦破也術時僭號故呼為明上術乃嚴兵為布作聲援又文選任彥升奏彈曹景宗注引袁術嚴兵為呂布作聲援布恐術為女不至故不遣兵救也以綿纏女身縛著馬上夜自送女出與術與太祖守兵相觸格射不得過復還城又御覽八百十九引呂布為曹公所攻甚急乃求救於袁術術先求布女下即接布恐術為女不至云云布欲令陳宮高順守城自將騎斷太祖糧道布妻謂曰將軍自出斷曹公糧道是也宮順素不和將軍一出宮順必不同心共守城也如有蹉跌將軍當於何自立乎願將軍諦計之無為宮等所誤也妾昔在長安已為將軍所棄賴得龐舒私藏妾身耳今不須顧妾也布得妻言愁悶不能自決魏志張邈傳注曹公擒呂布布顧劉備曰玄德卿為上坐客我為降虜繩縛我急獨不可一言耶操曰縛虎不得不急曹公欲緩之備曰不可公不見布事丁建陽董太師乎操憾之布目備曰大耳兒最叵信藝文十七又御覽八百九十二引曹公擒呂布布顧劉備曰玄德卿為坐上客我為降虜繩縛我急獨不可一言邪操曰縛餓虎不得不急乃命緩縛布又事類賦虎引同御覽顧上有布字布謂太祖曰布待諸將厚也諸將臨急皆叛布耳太祖曰卿背妻愛諸將婦何以為厚布默然魏志張邈傳注李叔節李叔節與弟進先共在乘氏城中呂布詣乘氏城下叔節從城中出詣布進先不肯出為叔節殺數頭肥牛提數十石酒作萬枚胡餅先持勞客御覽八百六十張楊楊及部曲諸將皆受傕汜購募共圖布布聞之謂楊曰布卿州里也卿殺布於卿弱不如賣布可極得汜傕爵寵楊於是外許汜傕內實保護布汜傕患之更下大封詔書以布為潁川太守魏志呂布傳注楊性仁和無威刑下人謀反發覺對之涕泣輒原不問魏志張楊傳注高順順為人清白有威嚴不飲酒不受饋遺所將七百餘兵號為千人鎧甲鬭具皆精練齊整每所攻擊無不破者名為陷陳營順每諫布言凡破家亡國非無忠臣明智者也但患不見用耳將軍舉動不肯詳思輒喜言誤誤不可數也布知其忠然不能用布從郝萌反後更疏順以魏續有外內之親悉奪順所將兵以與續及當攻戰故令順將續所領兵順亦終無恨意魏志張邈傳注又後漢呂布傳注引順為人不飲酒不受饋所將七百餘兵號為千人名陷陳營布後疏順奪順所將兵亦無恨意也臧洪袁紹以臧洪為東都太守時曹操圍張超於雍邱洪始聞超被圍乃徒跣號泣並勒所領將赴其難從紹請兵而紹竟不聽之超城遂陷張氏族滅洪由是怨紹絶不與通紹增兵急攻洪城中糧盡廚米三升使為薄糜偏頒衆又殺其愛妾以食兵將咸流涕無能仰視男女七八千相枕而死莫有離叛城陷生藝洪紹謂曰臧洪何相負若是今日服未洪據地瞋目曰諸袁事漢四世五公可謂受恩今王室衰弱無輔翼之意而欲因際會觖望非冀惜洪力劣不能推刃為天下報仇何為服乎紹乃命殺之洪邑人陳容在坐見洪當死起謂紹曰將軍今舉大事欲為天下除暴而先誅忠義豈合天意紹慚遣人牽出謂曰汝非臧洪儔歟空復爾為容顧曰夫仁義豈有常所蹈之則君子背之則小人今日寧與臧洪同日死不與將軍同日生遂復見殺在紹坐者無不歎息御覽四百二十二又四百十八引無首十一字於雍邱下即接臧洪從袁紹請兵將赴其難紹不聽之族下無滅字不上無絶字無城中糧盡至又十六字無咸字流涕下無無能仰視至而死十三字紹謂曰作紹問瞋目作瞑目衰弱作微弱無無輔翼至而欲七字劣作弱下作不能為天下推刃執仇乃命無乃字舉上無今字大事下無欲為天下除暴句遣人作使人汝非臧洪儔歟無非歟二字下並同公孫瓚公孫瓚字伯圭為上計吏郡太守劉基為事被徵伯圭褠衣平幘御車到洛陽身執徒養基將徙日南伯圭具豚米於北邙上祭先人舉觴醊祝曰昔為人子今為人臣當詣日南多瘴氣恐或不還與先人辭於此再拜慷慨而起其時州里人在京師者送行見之及觀者莫不歔欷在道得赦俱還御覽四百二十二又五百二十六引無字伯圭為四字基作其下作以事犯法檻車徵伯圭褠衣平幘御車到洛陽無身執徒養四字基將徙作其當徙下無人字觴上有舉字日南下重日南二字而起下作其時州里人在京師者送行見之及觀者莫不歔欷又六百八十七引公孫瓚字伯圭上計吏郡太守劉基以事公車徵伯圭褠衣平幘御車洛陽身執徒養公孫伯圭追討叛胡邱力居等於管子城伯圭力戰兵乏食馬盡煮弩楯啖食之御覽三百五十七公孫瓚與諸屬郡縣每至節會屠牛作脯每酒一觴致脯一豆書鈔一百四十五陳禹謨補公孫瓚與破虜校尉鄒靖俱追胡靖為所圍瓚回師奔救胡即破散解靖之圍乘勝窮追日入之後把炬逐北御覽八百七十瓚每與虜戰常乘白馬追不虛發數獲戎捷虜相告云當避白馬因虜所忌簡其白馬數千匹選騎射之士號為白馬義從一曰胡夷健者常乘白馬瓚有健騎數千多乘白馬故以號焉魏志袁紹傳注公孫瓚每聞邊警輒厲色作氣如赴仇嘗乘白馬又揀白馬數十匹選騎射之士號為白馬義從以為左右翼胡甚畏之相告曰當避白馬長史御覽八百九十七又事類賦馬引常乘白馬下作又選數十白馬為騎射之士餘俱同又藝文九十三引仇作讎嘗作常又下有揀字至胡甚畏之止又書鈔一百十七引公孫瓚常與健騎數十人皆乘白馬以為左右翼自號白馬義從公孫瓚除遼東屬國長史連接邊寇每有驚輒厲色憤怒如赴讎敵望塵奔繼之夜戰虜識瓚聲憚其勇莫敢犯之御覽四百三十七幽州歲歲不登人相食有蝗旱之災人始知採穭以棗椹為糧穀一石十萬錢公孫伯圭開置屯田稍稍得自供給御覽三十五又書鈔一百五十六引五穀不登民人以桑椹為糧瓚統內外衣冠子弟有才秀者必抑使困在窮苦之地或問其故答曰今取衣冠家子弟及善士富貴之皆自以為職當得之不謝人善也所寵遇驕恣者類多庸兒若故卜數師劉緯臺販繒李移子賈人樂何當等三人與之定兄弟之誓自號為伯謂三人者為仲叔季富皆巨億或取其女以配己子常稱古者曲周灌嬰之屬以譬也魏志公孫瓚傳注公孫瓚擊青州黃巾賊大破之還屯廣宗改易守令冀州長吏無不望風嚮應開門受之紹自往征瓚合戰於界橋南二十里瓚步兵三萬餘人為方陳騎為兩翼左右各五千餘匹白馬義從為中堅亦分作兩校左射右右射左旌旗鎧甲光照天地紹令麴義以八百兵為先登強弩千張夾承之紹自以步兵數萬結陳於後義久在涼州曉習羌鬭兵皆驍鋭瓚見其兵少便放騎欲陵蹈之義兵皆伏楯下不動未至數十步乃同時俱起揚塵大叫直前衝突強弩雷發所中必倒臨陳斬瓚所署冀州刺史嚴綱甲首千餘級瓚軍敗績步騎奔走不復還營義追至界橋瓚殿兵還戰橋上義復破之遂到瓚營拔其牙門營中餘衆皆復散走紹在後未到橋十數里下馬發鞍見瓚已破不為設備惟帳下強弩數十張大戟士百餘人自隨瓚部迸騎二千餘匹卒至便圍紹數重弓矢雨下別駕從事田豐扶紹卻入空垣紹以兜鍪撲地曰大丈夫當前鬭死而入牆間豈可得活乎強弩乃亂發多所殺傷瓚騎不知是紹亦稍引卻會麴義來迎乃散去魏志袁紹傳注又水經淇水注引公孫瓚擊青州黃巾賊大破之還屯廣宗袁本初自往征瓚合戰於界橋南二十里紹將麴義破瓚於界城橋斬瓚冀州刺史嚴綱又破瓚殿兵於橋上又御覽七十三引同水經注又御覽三百五十六引袁紹為公孫瓚所圍別駕田豐扶紹入空垣紹脫兜鍪抵地云丈夫當前鬭死而反逃入牆間豈可得活初平四年天子使太傅馬日磾太僕趙岐和解關東岐別詣河北紹出迎於百里上拜奉帝命岐往紹營移書告瓚瓚遣使具與紹書曰趙太僕以周召之德銜命來征宣揚朝恩示以和睦曠若開雲見日何喜如之昔賈復寇恂亦爭士卒欲相危害遇光武之寬親俱陛見同輿共出時人以為榮自省邊鄙得與將軍共同此福此誠將軍之眷而瓚之幸也魏志袁紹傳注先是有童謠曰燕南垂趙北際中央不合大如礪惟有此中可避世瓚以易當之乃築京固守瓚別將有為敵所圍義不救也其言曰救一人使後將恃救不力戰今不救此後將當念在自勉是以袁紹始北擊之時瓚南界上別營自度守則不能自固又知必不見救是以或自殺其將帥或為紹兵所破遂令紹軍徑至其門魏志公孫瓚傳注瓚諸將家家各有高樓樓以千計瓚作鐵門居樓上屏去左右婢妾侍側汲上文書同上袁紹分部攻者掘地為道穿穴其樓下稍稍施木柱之度足達半便燒所施之柱樓輒傾倒同上關靖關靖字士起太原人本酷吏也諂而無大謀特為瓚所信幸魏志公孫瓚傳注袁紹袁紹父成字文開名壯健貴戚權豪自大將軍梁冀以下皆與交結恩好言無不從故京師諺曰事不諧詣文開御覽三百八十六又魏志袁紹傳注引無袁紹父三字壯健上無名字下有有部分三字交結恩好祗結好二字諺上有為作二字又御覽四百九十六引袁紹父成字文開貴盛自梁冀以下皆與交言無不從京師諺曰事不諧詣文開紹生而父死二公愛之幼使為郎弱冠除濮陽長有清名遭母喪服竟又追行父服凡在冡廬六年禮畢隱居洛陽不妄通賓客非海內知名不得相見又好遊俠與張孟卓何伯求吳子卿許子遠伍德瑜等皆為奔走之友不應辟命中常侍趙忠謂諸黃門曰袁本初坐作聲價不應呼召而養死士不知此兒欲何所為乎紹叔父隗聞之責數紹曰汝且破我家紹於是乃起應大將軍之命魏志袁紹傳注又後漢書袁紹傳注引凡在冡廬六年又引不妄通賓客至奔走之友唯無伍德瑜三字又御覽四百五引袁紹居雒陽西北陬不妄通賓客非海內知名不得相見又四百九引袁紹不妄通賓客好遊俠與張孟卓何伯求吳子卿許子遠伍德瑜等皆奔走之友不應辟命袁紹生而孤幼為郎容貌端正威儀進止動見仿效弱冠除服長有清能名御覽三百八十九末七字鮑刻本作除復陽長有清能名袁紹有姿貌威容愛士養名既纍世台司賓客所歸加以傾心折節莫不爭赴其庭士無貴賤與之抗禮御覽四百七十五袁紹辟大將軍府不得已起從命舉高第遷侍御史弟術為尚書紹不欲為臺下告疾求退御覽二百二十七董卓謂袁紹曰皇帝沖暗非萬機之主陳留王猶勝今欲立之紹勃然曰天下健者豈惟董公橫刀長揖徑出懸節於東門而奔冀州書鈔一百二十三又御覽三百四十五引皇帝至立之作劉氏種不足復遺餘並同東門作上東門是時年號初平紹字本初自以為年與字合必能克平禍亂魏志袁紹傳注紹既破瓚引軍南到薄落津方與賓客諸將共會聞魏郡兵反與黑山賊于毒共覆鄴城遂殺太守栗成賊十餘部衆數萬人聚會鄴中坐上諸客有家在鄴者皆憂怖失色或起啼泣紹容貌不變自若也賊陶升者故內黃小吏也又後漢書袁紹傳注引升故為內黃小史有善心獨將部衆踰西城人閉守州門不內他賊以車載紹家及諸衣冠在州內者身自扞衛送到斥邱乃還紹到遂屯斥邱以陶升為建義中郎將乃引軍入朝歌鹿場山蒼巖谷討于毒圍攻五日破之斬毒及長安所署冀州牧壼壽遂尋山北行薄擊諸賊左髭丈八等皆斬之又擊劉石青牛角黃龍左校郭大賢李大目于氐根等皆屠其屯壁奔走得脫斬首數萬級紹復還屯鄴魏志袁紹傳注紹遣使即拜烏丸三王為單于皆安車華蓋羽旄黃屋左纛版文曰使持節大將軍督幽青并領冀州牧阮鄉侯紹承制詔遼東屬國率衆王頒下烏丸遼西率衆王踏頓右北平率衆王汗盧維乃祖募義遷善款塞內附北捍玁狁東拒濊貊世守北陲為百姓保障雖時侵犯王略命將徂征厥罪率不旋時悔愆變改方之外夷最又聰惠者也始有千夫長百夫長以相統領用能悉乃心克有勳力於國家稍受王侯之命自我王室多故公孫瓚作難殘夷厥土之君以侮天慢主是以四海之內並執干戈以衛社稷三王奮氣裔土忿姦憂國控弦與漢兵為表裏誠甚忠孝朝所嘉焉然而虎兕長蛇相隨塞路王官爵命否而無聞夫有勳不賞俾勤者怠今遣行謁者楊林齎單于璽綬車服以對爾勞其各綏靜部落教以謹慎無使作凶作惡世復爾祀位長為百蠻長厥有咎有不臧者泯於爾祿而喪於乃庸可不勉乎烏丸單于都護部衆左右單于受其節度他如故事魏志烏桓傳注袁遺袁遺字伯業後漢書袁紹傳注紹後用遺為揚州刺史為袁術所敗魏志武帝紀注袁術紹從弟術字公路汝南汝陽人也後漢書袁紹傳注麴義袁紹討公孫瓚先令麴義領精兵八百強弩千張以為前登瓚輕其兵少縱騎騰之義兵伏楯下一時同發瓚軍大敗御覽三百五十七又三百四十八引至前登討作擊麴義後恃功而驕恣紹乃殺之魏志袁紹傳注逢紀逢紀説紹曰將軍舉大事而仰人資給不據一州無以自全紹答云冀州兵強吾士飢乏設不能辨無所容立紀曰可與公孫瓚相聞導使來南擊取冀州公孫必至而馥懼矣因使説利害為陳禍福馥必遜讓於此之際可據其位紹從其言而瓚果來魏志袁紹傳注紀字元圖初紹去董卓出奔與許攸及紀俱詣冀州紹以紀聰達有計策甚親信之與共舉事後審配任用與紀不睦或有讒配於紹者紹問紀紀稱配天性烈直古人之節不宜疑之紹曰君不惡之邪紀答曰先日所爭者私情今所陳者國事紹善之卒不廢配配由是更與紀為親善同上又後漢書袁紹傳注引至甚親信之無出奔二字又荀彧傳注同信上無親字審配審配任用與紀不睦辛評郭圖皆比於談後漢書袁紹傳注袁尚使審配守鄴曹操進軍攻鄴審配將馮禮為內應開突門內操兵三百餘人配覺之從城上以大石擊門門閉入者皆死操乃鑿塹圍回四十里初令淺示若可越配望見笑而不出操令一夜濬之廣深二丈決漳水灌之自五月至八月城中餓死者過半尚聞鄴急將兵萬餘人還救操逆擊破之尚走依曲漳為營操復圍之尚懼遣陰夔陳球請降不聽尚還走藍田操復進擊圍之尚將馬迎等臨陳降衆大潰尚奔中山人盡收其輜重得尚印綬節鉞及衣物以示城中城中崩沮審配命士卒曰堅守死戰操軍疲矣幽州方至何憂無主以其兄子榮為東門校尉榮夜開門內操兵配猶拒戰城陷生獲配操意活之配意氣壯烈終無撓辭見者莫不歎息遂斬之御覽三百十七又書鈔一百十八引袁尚使審配守鄴曹操進軍攻鄴配將馮禮叛為內應開突門內操兵三百餘人配覺之從城上以大石擊突中柵門柵門閉入者皆死沒袁尚使審配守鄴曹操攻之操出行圍配伏弩射之幾中及城陷生獲配操謂曰吾近行圍弩何多也配曰猶恨其少操曰即忠於袁氏不得不爾志欲活之配意氣壯烈終無撓辭遂斬之御覽四百三十八又三百四十八引袁尚使審配守鄴城曹操進軍攻鄴生獲配謂曰吾近行圍弩何多也配曰猶恨其少郭圖談尚戰於外門談軍敗奔北郭圖説談曰今將軍國小兵少糧匱勢弱顯甫之來久則不敵愚以為可呼曹公來擊顯甫曹公至必先攻鄴顯甫還救將軍引兵而西自鄴以北皆可虜得若顯甫軍破其兵奔亡又可斂取以拒曹公曹公遠僑而來糧餉不繼必自逃去比此之際趙國以北皆我之有亦足與曹公為對矣不然不諧談始不納後遂從之問圖誰可使圖答辛佐治可談遂遣毗詣太祖魏志辛毗傳注韓珩袁談既死弟熙尚為其將焦觸張南所攻奔遼西烏桓觸自號幽州刺史陳兵數萬殺白馬盟曰違命者斬各以次歃至別駕代郡韓珩曰吾受袁公父子厚恩今其破亡智不能救勇不能死北面曹氏所不能為也一坐為珩失色觸曰舉大事當立大義事之濟否不待一人可卒珩志以厲事君曹操聞珩節甚高之屢辟不至御覽四百二十二陳瑀陳溫字元悌汝南人先為揚州刺史自病死袁紹遣袁遺領州敗散奔沛國為兵所殺袁術更用陳瑀為揚州瑀字公瑋下邳人瑀既領州而術敗於封邱南向壽春瑀拒術不納術退保陰陵更合軍攻瑀瑀懼走歸下邳魏志袁術傳注韓馥馥字文節潁川人為御史中丞董卓舉為冀州牧于時冀州民人殷盛兵糧優足袁紹之在勃海馥恐其興兵遣數部從事守之不得動搖東郡太守橋瑁作京師三公移書與州郡陳卓罪惡云見逼迫無以自救企望義兵解國患難馥得移請諸從事問曰今當助袁氏邪助董卓邪治中從事劉子惠曰今興兵為國何謂袁董馥自知言短而有慚色子惠復言兵者凶事不可為首今宜往視他州有發動者然後和之冀州於他州不為弱也他人功未有在冀州之右者也馥然之馥乃作書與紹道卓之惡聽其舉兵魏志武帝紀注冀州刺史韓馥問諸從事曰馥有何長何短治中劉子曰前勞賜有餘肉百斤賣之一州調度奢儉不復在是猶可勞賜勤勞吏士賣之示狹御覽八百六十三袁紹使張景明郭公則高元才等説韓馥使讓冀州魏志臧洪傳注又後漢書郡國志注引冀州下有與紹二字劉子惠劉子惠中山人兗州刺史劉岱與其書道卓無道天下所共攻死在旦暮不足為憂但卓死之後當復回師討文節擁強兵何凶逆寧可得置封書與馥馥得此大懼歸咎子惠欲斬之別駕從事耿武等排閣伏子惠上願并見斬得不死作徒被赭衣掃除宮門外後漢書袁紹傳注趙浮紹在朝歌清水口浮等從後來船數百艘衆萬餘人整兵駭鼓過紹營紹甚惡之浮等到謂馥曰袁本初軍無斗糧各欲離散旬日之間必土崩瓦解將軍但閉戶高枕何憂何懼後漢書袁紹傳注耿武閔純耿武字文成閔純字伯典後袁紹至馥從事十餘人棄馥去唯恐在後獨武純杖刀拒兵不能禁紹後令田豐殺此二人後漢書袁紹傳注朱漢紹以河內朱漢為都官從事漢先時為馥所不禮內懷怨恨且欲邀迎紹意擅發城郭兵圍守馥第拔刃登屋馥走上樓收得馥大兒捶折兩腳紹亦立收漢殺之馥猶有憂怖故報紹索去魏志袁紹傳注又後漢書袁紹傳注引同王匡匡字公節泰山人輕財好施以任俠聞辟大將軍何進府進符使匡於徐州發強弩五百西詣京師會進敗匡還州里起家拜河內太守魏志武帝紀注又後漢書獻帝紀注引匡字公節泰山人輕財好施以任俠聞為袁紹河內太守又董卓傳注引至以任俠聞又袁紹傳注引王匡字公節泰山人也又書鈔一百二十五引匡上有王字使上無符字州作鄉無末七字又御覽三百四十八引匡上有王字使上無進符二字州作鄉下無里字又四百七十七引鄉下有里字俱無末七字孔胄胄字公緒陳留人魏志武帝紀注又後漢書董卓傳注引胄字公緒又袁紹傳注引胄上有孔字人下有也字劉虞虞為博平令治正推平高尚純朴境內無盜賊災害不生時鄰縣接壤蝗蟲為害至博平界飛過不入魏志公孫瓚傳注虞讓太尉因薦衛尉趙謨益州牧劉焉豫州牧黃琬南陽太守羊續並任為公同上幽州刺史劉虞食不重肴藍縷繩履書鈔三十八一百三十六又御覽二百五十八引肴作肴履作屨虞之見殺故常山相孫瑾掾張逸張瓚等忠義奮發相與就虞罵瓚極口然後同死魏志公孫瓚傳注劉岱岱孝悌仁恕以虛己受人吳志劉繇傳注劉翊劉翊字子相潁川人遷陳留太守出關數百里見士大夫病亡道次翊以馬易棺脫衣殮之又逢知故困餓於路不忍委去因殺所駕牛以救之衆人止之翊曰視沒不救非志士遂俱餓死御覽四百十九劉表州界群寇既盡表乃開立學官博求儒士使綦母闓宋忠等撰定五經章句謂之後定魏志劉表傳注張羡張羡南陽人先作零陸桂陽長甚得江湘間心然性屈強不順表薄其為人不甚禮也羡由是懷恨遂叛表焉魏志劉表傳注又後漢書劉表傳注引長作守無末焉字劉焉劉焉起兵不與天下討董卓保州自守犍為太守任歧自稱將軍與從事陳超舉兵擊焉焉擊破之董卓使司徒趙謙將兵向州説校尉賈龍使引兵還擊焉焉出青羌與戰故能破殺歧龍等皆蜀郡人蜀志劉焉傳注範父焉為益州牧董卓所徵發皆不至收範兄弟三人鎖械於郿塢為陰獄以擊之同上範從長安亡之馬騰營從焉求兵焉使校尉孫肇將兵往助之敗於長安同上劉璋焉死子璋代為刺史會長安拜潁川扈瑁為刺史入漢中荊州別駕劉闔璋將沈彌婁發甘寧反擊璋不勝走入荊州璋使趙韙進攻荊州屯朐䏰蜀志劉焉傳注先是南陽三輔人流入益州數萬家收以為兵名曰東州兵璋性寬柔無威略東州人侵暴舊民璋不能禁政令多闕益州頗怨趙韙素得人心璋委任之韙因民怨謀叛乃厚賂荊州請和陰結州中大姓與俱起兵還擊璋蜀郡廣漢犍為皆應韙璋馳入成都城守東州人畏韙咸同心並力助璋皆殊死戰遂破反者進攻韙於江州韙將龐樂李異反殺韙軍斬韙蜀志劉璋傳注龐羲龐羲與璋有舊又免璋諸子於難故璋厚德羲以羲為巴西太守遂專權勢蜀志劉璋傳注劉備靈帝末年備嘗在京師復與曹公俱還沛國募召合衆會靈帝崩天下大亂備亦起軍從討董卓蜀志先主傳注備留張飛守下邳引兵與袁術戰於淮陰石亭更有勝負陶謙故將曹豹在下邳張飛欲殺之豹衆堅營自守使人招呂布布取下邳張飛敗走備聞之引兵還比至下邳兵潰收散卒東取廣陵與袁術戰又敗同上備軍在廣陵飢餓困踧吏士大小自相啖食窮餓侵逼欲還小沛遂使吏請降布布令備還州并勢擊術具刺史車馬童僕發遣備妻子部曲家屬於泗水上祖道相樂同上建安三年春布使人齎金欲詣河內買馬為備兵所鈔布由是遣中郎將高順北地太守張遼等攻備九月遂破沛城備單身走獲其妻息十月曹公自征布備於梁國界中與曹公相遇遂隨公俱東征同上表病上備領荊州刺史同上孫堅劉表將呂公將兵緣山向堅堅輕騎尋山討公公兵下石中堅頭應時腦出物故吳志孫堅傳注堅以初平四年正月七日死同上胡軫初堅討董卓到梁縣之陽人卓亦遣兵步騎五千迎之陳郡太守胡軫為大督護呂布為騎督其餘步騎將校都督者甚衆軫字文才性急預宣言曰今此行也要當斬一青綬乃整齊耳諸將聞而惡之軍到廣成去陽人城數十里日暮士馬疲極當止宿又本受卓節度宿廣成秣馬飲食以夜進兵投曉攻城諸將惡憚軫欲賊敗其事布等宣言陽人城中賊已走當追尋之不然失之矣便夜進軍城中守備甚設不可掩襲於是吏士飢渴人馬甚疲且夜至又無塹壘釋甲休息而布又宣言相驚云城中賊出來軍衆擾亂奔走皆棄甲失鞍馬行十餘里定無賊會天明便還拾取兵器欲進攻城城守已固穿塹已深軫等不能攻而還吳志孫堅傳注張咨咨字子儀潁川人亦知名吳志孫堅傳注又後漢書袁術傳注引儀作議無末三字周瑜周瑜鎮江夏曹操欲從赤壁渡江南無船乘簰從漢水下住浦口未即渡瑜夜密使輕船走舸百數艘艘有五十人移棹人持炬火持火者數千人立於船上以萃於𥱼至乃放火火然則回船走去去復還燒者須臾燒數千簰火大起光上照天操乃夜去藝文八十又御覽八百六十八引簰作𥱼從漢作沿漢住作至百數艘無數字移作拖持炬火下有持火者數千人立於船上以萃於𥱼至乃放火十八字走去下無去復還燒者五字火大起無大字夜去上有乃字又八百七十引周瑜敗曹操於赤壁密使輕船走舸百餘艘艘有五十人拖棹人持炬火孔子舉孔文舉為東萊賊所攻城欲破其治中左承祖以官棗賦與戰士御覽九百六十五又事類賦棗引其上有而字賦下無與字向栩向栩字甫興性卓詭不倫恆讀老子狀如學道又似狂生好被髮著襂頭常於竈北坐板床上如是積久板乃有膝踝足指之處御覽七百三十九又三百七十二引向栩坐板床有兩踝處入板中三寸許又書鈔一百三十三引向栩常坐梨床上向栩為性卓詭不凡好讀老子狀如學道又復似狂居嘗竈北坐被髮喜長嘯人客從就輒伏不視人有於栩前獨拜栩不答御覽三百九十二尚栩先人尚子平有道術為縣功曹休歸自入山擔薪賣以食飲御覽二百六十四又文選嵇叔夜與山巨源絶交書注引無首四字飲作供又孔德璋北山移文注引同食上有飲字李周翰曰尚長字子平王莽時司徒王邑薦之固辭後遂入山隱也又於北山移文下云尚長字子平男女嫁娶訖便隱而不出按尚子平西漢末東漢初人此蓋因尚栩而類及之閰忠涼州賊王國等起兵共劫忠為主統三十六部號車騎將軍忠感慨發病而死魏志賈栩傳注又後漢書皇甫嵩傳注引無共字末作忠感傷發病死又董卓傳注截引涼茂茂名在八友中魏志涼茂傳注張儉先是張儉等相與作衣冠糾彈彈中人相調言我彈中誠有八俊八乂猶古之八元八凱也世説新語品藻篇注又後漢書郡國志會稽郡鄮烏傷下注引英雄交爭記云初平三年分縣南鄉為長山縣按所引疑即漢末英雄記又御覽七百一十六引在尊者前宜各具一手巾不宜借人巾用此條不知何屬並附録於末英雄記補遺英雄記補遺董卓廢少帝自公卿己下莫不卑下於卓唯京兆尹蓋勳長揖爭禮見者皆為失色太平御覽二百五十二董常大會賓客誘降反者以鑊之會者戰栗亡失匕箸太平御覽七百六十董卓少嘗遊羌中與豪帥相結後更歸耕於野諸豪帥有來從之者卓乃為殺耕牛與之共宴樂太平御覽九百呂布詣董卓卓常拔戟擲之言布亂其私室太平御覽三百五十二魏太祖討呂布於濮陽布有別屯在濮西太祖夜襲比明破之未及還會布救兵至三面挑戰太祖募陷陳典韋先占將應募韋左手持十餘戟大呼走起所抵無不應手倒者北堂書鈔一百十八袁尚熙俱入未及坐康叱兵擒之坐於凍地尚謂康曰未死之間寒不可忍北堂書鈔一百五十六成瑨為南陽太守善用士也北堂書鈔七十七成瑨為南陽太守用岑晊為功曹褒善詘惡北堂書鈔三十四變化無方北堂書鈔十三
