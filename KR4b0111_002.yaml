body:
  text: 卷二大暑賦惟林鍾之季月重陽積而上升熹潤土之溽暑扇溫風而至興或赫爔以瘴炎或鬱術而燠蒸獸狼望以倚喘鳥垂翼而弗翔根生苑而焦炙豈含血而能當遠崑吾之中景天地翕其同光征夫瘼于原野處者困于高堂患衽席之焚灼譬洪燎之在床起屏營而東西欲避之而無方仰庭槐而嘯風風既至而如湯氣呼吸以袪裾汗雨下而沾裳就清泉以自沃猶淟涊而不涼體煩茹以於悒心憤悶而宭惶于是帝后順時幸九嵕之陰岡託甘泉之清野御華殿于林光潛廣室之邃宇激寒流于下堂重屋百層垂陰千廡九闥洞開周帷高舉堅冰常奠寒饌代敘藝文類聚五初學記三御覽三十四雄風颯然兮時動帷帳之纖羅北堂書鈔一百三十二游海賦含精純之至道兮將輕舉而高厲游余心以廣觀兮且仿佯乎四裔乘蘭桂之方舟浮大江而遙逝翼驚風以長驅集會稽而一憩登陰隅以東望兮覽滄海之體勢吐星出日天與水際其深不測其廣無臬尋之冥地不見涯泄章亥所不極盧敖所不屆洪洪洋洋誠不可度也處嵎夷之正位兮同色號于穹蒼苞吐納之弘量正宗廟之紀綱總衆流而臣下為百谷之君王洪濤奮蕩大浪踽躍山隆谷窳宛亶相搏懷珍藏寶神隱怪匿或無氣而能行或含血而不食或有葉而無根或能飛而無翼鳥則爰居孔鵠翡翠鷫鸘繽紛往來沈浮翱翔魚則橫尾曲頭方目偃額大者若丘陵小者重鈞石乃有賁蛟大貝明月夜光蠵鼊玳瑁金質黑章若夫長洲別島碁布星峙高或萬尋近或千里桂蘭藂乎其上珊瑚周乎其趾群犀代角巨象解齒黃金碧玉名不可紀北堂書鈔一百三十七藝文類聚八初學記六兩引又文選江賦注乘菌桂之舟晨鳧之舸太平御覽七七零引王粲海賦海上疑脫游字又見事類賦一六浮淮賦從王師以南征兮浮淮水而遐逝背渦浦之曲流兮望馬丘之高澨泛洪榜于中潮兮飛輕舟乎濱濟建衆檣以成林兮譬巫山之樹藝于是迅風興濤波動長瀨潭偎滂沛洶溶鉦鼓若雷旌麾翳日飛雲天回若鷹飄逸遞相競軼凌驚波以高騖馳駭浪而赴質加舟徒之巧極美榜人之間疾白日未移前驅已屆群師按部左右就隊軸轤千里名卒億計運茲威以赫怒清海隅之蒂芥濟元勳于一舉垂休績于來裔書鈔一百三十七一百三十八藝文類聚八初學記六間邪賦夫何英媛之麗女貌洵美而豔逸橫四海而無仇超遐世而秀出發唐棣之春華當盛年而處室恨年歲之方暮哀獨立而無依情紛拏以交橫意慘悽而增悲何性命之奇薄愛兩絶而俱違排空房而就衽將取夢以通靈目炯炯而不寐心忉怛而惕驚藝文類聚十八關山介而阻險文選謝元暉暫使下都夜發新林贈西府同僚詩注願為環以約腕書鈔一百三十六引王粲間居賦當是間邪之誤出婦賦既僥幸兮非望逢君子兮弘仁當隆暑兮翕赫猶蒙眷兮見親更盛衰兮成敗思情固兮日新竦余身兮敬事理中饋兮恪勤君不篤兮終始樂枯荑兮一時心搖蕩兮變易忘舊姻兮棄之馬已駕兮在門身當去兮不疑攬衣帶兮出戶顧堂室兮長辭藝文類聚三十傷夭賦惟皇天之賦命實浩蕩而不均或老終以長世或昏夭而夙泯物雖存而人亡心惆悵而長慕哀皇天之不惠抱此哀而何訴求魂神之形影羌幽冥而弗忤淹徘徊以想像心彌結而紆縈晝忽忽其若昏夜炯炯而至明藝文類聚三十四思友賦登城隅之高觀忽臨下以翱翔行游目于林中覩舊人之故場身既沒而不見餘迹存而未喪滄浪浩兮回流波水石激兮揚素精夏木兮結莖春鳥兮愁鳴平原兮泱漭緑草兮羅生超長路兮逶迤實舊人兮所經身既逝兮幽翳魂眇眇兮藏形藝文類聚三十四寡婦賦闔門兮卻掃幽處兮高堂提孤孩兮出戶與之步兮東廂顧左右兮相憐意悽愴兮摧傷觀草木兮敷榮感傾葉兮落時人皆懷兮歡豫我獨感兮不怡日掩曖兮不昏明月皎兮揚暉坐幽室兮無為登空床兮下幃涕流連兮交頸心憯結兮增悲藝文類聚三十四欲引刃以自裁顧弱子而復停文選潘嶽寡婦賦注初征賦違世難以回折兮超遙集乎蠻楚逢屯否而底滯兮忽長幼以羈旅賴皇華之茂功清四海之疆宇超南荊之北境踐周豫之末畿野蕭條而騁望路周達而平夷春風穆其和暢兮庶卉煥以敷蕤行中國之舊壤實吾願之所依當短景之炎陽犯隆暑之赫曦薰風溫溫以增熱體燁燁其若焚藝文類聚五十九登樓賦登茲樓以四望兮聊暇日以銷憂覽斯宇之所處兮實顯敞而寡仇挾清漳之通浦兮倚曲沮之長洲背墳衍之廣陸兮臨皋隰之沃流北彌陶牧西接昭丘華實蔽野黍稷盈疇雖信美而非吾土兮曾何足以少留遭紛濁而遷逝兮漫踰紀以迄今情眷眷而懷歸兮孰憂思之可任憑軒檻以遙望兮向北風而開襟平原遠而極目兮蔽荊山之高岑路逶迤而修迥兮川既漾而濟深悲舊鄉之壅隔兮涕橫墜而弗禁昔尼父之在陳兮有歸歟之歎音鍾儀幽而楚奏兮莊舄顯而越吟人情同于懷土兮豈窮達而異心惟日月之逾邁兮俟河清其未極冀王道之一平兮假高衢而騁力懼匏瓜之徒懸兮畏井泄之莫食步棲遲以徙倚兮白日忽其將匿風蕭瑟而竝興兮天慘慘而無色獸狂顧以求群兮鳥相鳴而舉翼原野闃其無人兮征夫行而未息心悽愴以感發兮意忉怛而憯惻循階除而下降兮氣交憤于胸臆夜參半而不寐兮悵盤桓以反側文選藝文類聚六十三羽獵賦遵古道以游豫兮昭勸助乎農圃用時隙之餘日兮陳苗狩而講旅濟漳浦而橫陳倚紫陌而竝征樹重圍于西址列駿騎乎平坰相公乃乘輕軒駕四駱駙流星屬繁弱選徒命士咸與竭作旌旗雲擾鋒刃林錯揚暉吐火曜野蔽澤山川于是乎搖蕩草木為之以摧撥禽獸振駭魂亡氣奪興頭觸系搖足遇撻陷心裂胃潰腦破頰鷹犬競逐奕奕霏霏下韝窮緤搏肉噬肌墜者若雨僵者若坻清野滌原莫不殲夷藝文類聚六十六又初學記二十二引三條叢華雜沓煥衍陸離酒賦帝女儀狄旨酒是獻苾芬享祀人神式宴麴糱必時良工從試辨其五齊節其三事醍沈盎泛清濁各異章文德于廟堂協武義于三軍致子弟之孝養糾骨肉之睦親成朋友之歡好贊交往之主賓既無禮而不入又何事而不因賊功業而敗事毀名行以取誣遺大恥于載籍滿簡帛而見書孰不飲而羅茲罔非酒而惟事昔在公旦極茲話言濡首屢舞談易作難大禹所忌文王是艱暨我中葉酒流猶多群庶崇飲日富月奢藝文類聚七十二書鈔一百四十八神女賦惟天地之普化何産氣之淑真陶陰陽之休液育夭麗之神人稟自然以絶俗超希世而無群體纖約而方足膚柔曼以豐盈髮似玄鑒鬢類削成質素純皓粉黛不加朱顏熙曜曄若春華口譬含丹目若瀾波美姿巧笑靨輔奇葩戴金羽之首飾珥照夜之珠璫襲羅綺之黼衣曳縟繡之華裳錯繽紛以雜佩袿熠爚而焜煌退變容而改服冀致態以相移登筵對兮倚床垂稅袿裳兮兔簪笄施華的兮結羽叉揚娥微眄懸藐流離婉約綺媚舉動多宜稱詩表志安氣和聲探懷授心發露幽情彼佳人之難遇真一遇而長別顧大罰之淫愆亦終身而不滅心交戰而貞勝乃回意而自絶藝文類聚七十九書鈔一百三十五文選潘嶽寡婦賦注史記五宗世家索隱御覽三百八十一又七百十九投壺賦序投壺賦序夫注心銃念自求諸身投壺是也御覽七百五十三圍碁賦序圍碁賦序清靈體道稽謨玄神圍碁是也御覽七百五十三彈碁賦序彈碁賦序因行騁志通權達理六博是也御覽七百五十四迷迭賦惟遐方之珍草兮産崑崙之極幽受中和之正氣兮承陰陽之靈休揚豐馨于西裔兮布和種于中州去原野之側陋兮植高宇之外庭布萋萋之茂葉兮挺苒苒之柔莖色光潤而采發兮以孔翠之揚精藝文類聚八十一瑪瑙勒賦遊大國以廣觀兮覽希世之偉寶總衆材而課美兮信莫臧于瑪瑙被文采之華飾雜朱緑與蒼皂於是乃命工人裁以飾勒因姿象形匪雕匪刻厥容應規厥性順德御世嗣之駿服兮表騄驥之儀式藝文類聚八十四御覽三百五十八又八百八車渠碗賦侍君子之宴坐覽車渠之妙珍挺英才于山嶽含陰陽之淑真飛輕縹與浮白若驚風之飄雲光清朗以內曜澤溫潤而外津體貞剛而不撓理修達而有文雜玄黃以為質似乾坤之未分兼五德之上美超衆寶而絶倫藝文類聚八十四御覽八百八援柔翰以作賦文選左思詠史詩注槐樹賦槐樹賦惟中唐之奇樹稟自然之天姿超疇畝而登殖作階庭之華暉形禕禕以暢條色采采而鮮明豐茂葉之幽藹履中夏而敷榮既立本于殿省植根柢其弘深鳥願棲而投翼人望庇而披襟藝文類聚八十八初學記二十八柳賦昔我君之定武改天屆而徂征元子從而撫軍植嘉木于茲庭歷春秋以逾紀行復出于斯鄉覽茲樹之豐茂紛旖旎以修長枝扶疏而覃布莖槮梢以奮揚人情感于舊物心惆悵以增慮行游目而廣望覩城壘之故處悟元子之話言信思難而存懼嘉甘棠之不伐畏取纍于此樹苟遠迹而退之豈駕遲而不屢藝文類聚八十九初學記二十八白鶴賦白翎稟靈龜之修壽資儀鳳之純精接王喬于湯谷駕赤松于扶桑餐靈嶽之瓊蕊吸雲表之露漿藝文類聚九十鶡賦惟茲鶡之為鳥信才勇而徑武服乾剛之正氣被淳駹之質羽訴晨風以群鳴震聲發乎外宇厲廉風與猛節超群類而莫與惟膏薰之焚銷固自古之所咨逢虞人而見獲遂因執乎縹纍賴有司之圖功不開小而漏微令薄軀以免害從孔鶴于園湄藝文類聚九十鸚鵡賦步籠阿以躑躅叩衆目之希稠登衡幹以上干噭哀鳴而舒憂聲嚶嚶以高厲又憀憀而不休聽喬木之悲風羡鳴友之相求日奄藹以西邁忽逍遙而既冥就隅角而斂翼倦獨宿而宛頸藝文類聚九十一鶯賦覽堂隅之籠鳥獨高懸而背時雖物微而命輕心悽愴而愍之日奄藹以西邁忽逍遙而既冥就隅角而斂翼眷獨宿而宛頸歷長夜以向晨聞倉庚之群鳴春鳩翔于南甍戴鵀集乎東榮既同時而異憂實感類而傷情藝文類聚九十二為劉荊州諫袁談書為劉荊州諫袁談書天降災害禍難殷流初交殊族卒成同盟使王室震蕩彝倫攸斁是以智達之士莫不痛心入骨傷時人不能相忍也然孤與太公志同願等雖楚魏絶邈山河迥遠戮力乃心共獎王室使非族不干吾盟異類不絶吾好此孤與太公無二之所致也功績未卒太公殂隕賢胤承統以繼洪業宣奕世之德履丕顯之祚摧嚴敵于鄴都揚休烈于朔土顧定疆宇虎視河外凡我同盟莫不景附何悟青蠅飛于竿旌無忌游于二壘使股肱分成二體胸膂絶為異身初聞此問尚謂不然定聞信來乃知閼伯實沈之忿已成棄親即讎之計已決旃旆交于中原暴尸纍于城下聞之哽咽若存若亡昔三王五伯下及戰國君臣相弒父子相殺兄弟相殘親戚相滅蓋時有之然或欲以成王業或欲以定霸功皆所謂逆取順守而徼富強于一世也未有棄親即異兀其根本而能全于長世者也昔齊襄公報九世之讎士丐卒荀偃之事是故春秋美其義君子稱其信夫作游之恨於齊未若太公之忿于曹也宣子之臣承業未若仁君之繼統也且君子違難不適讎國交絶不出惡聲況忘先人之讎棄親戚之好而為萬世之戒遺同盟之恥哉蠻夷戎狄將有誚讓之言況我族類而不痛心邪夫欲立竹帛于當時全宗祀于一世豈宜同生分謗爭校得失乎若冀州有不弟之慠無慚順之節既已然矣仁君當降志辱身以濟事為務事定之後使天下平其曲直不亦為高義邪今仁君見憎于夫人未若鄭莊之于姜氏昆弟之嫌未若重華之于象敖然莊公卒從大隧之樂象敖終受有鼻之封願捐棄百痾追攝舊義復為母子昆弟如初今整勒士馬瞻望鵠立後漢書袁紹傳注云書見王粲集又魏志袁紹傳注引魏氏春秋有刪節天篤降害禍亂殷流尊公殂殞四海悼心賢胤承統遐邇屬望咸欲展布旅力以投盟主雖亡之日猶存之願也何寤青蠅飛于干旍無極游于二壘使股肱分為二體背膂絶為異身昔三王五伯下及戰國父子相殘蓋有之矣然或欲以成王業或欲以定霸功或欲以顯宗主或欲以固冢嗣未有棄親即異杌其木根而能崇業濟功垂祚後世者哉若齊襄復九世之讎士丐卒荀偃之事是故春秋美其義君子稱其信夫伯游之恨于齊未若太公之忿曹宣子之成業未若仁君之繼統也且君子之違難不適讎國豈可忘先君之怨棄至親之好為萬世之戒遺同盟之恥哉冀州不弟之慠既已然矣仁君當降志辱身以匡國為務雖見憎于夫人未若鄭莊之于姜氏兄弟之嫌未若重華之于象傲也然莊公有大隧之樂象受有鼻之封願棄捐前忿遠思舊義復為母子昆弟如初魏志袁紹傳注引魏氏春秋與後漢書小異今竝録之為劉荊州與袁尚書表頓首頓首將軍麾下勤整六師芟討暴虐戎馬厮養罄無不宜甚善甚善河山阻限狼虎當路雖遣驛使或至或否使引領告而莫達初聞郭公則辛仲治通內外之言造交遘之隙使士民不協姦釁竝作聞之諤然為增忿怒校尉劉堅皇河田買等前後到荊得二月六日所起書又得賢兄貴弟顯雍及審別駕書陳敘事變本末之理乃知變起辛郭禍結同生追閼伯實沈之蹤忘棠棣死喪之義親尋干戈僵尸流血聞之哽咽若存若亡乃追案書傳思與古比昔軒轅有涿鹿之戰周公有商奄之軍皆所以翦除災害而定王業者也非強弱之爭喜怒之忿也是故雖滅親不為尤誅兄不傷義也今二君初承洪業篡繼前軌進有國家傾危之慮退有先公遺恨之責當惟曹是務不爭雄雌之勢惟國是康不計曲直之利雖蒙塵垢罪下為隸圉析入汙泥猶當降志辱身方以定事為計何者夫金木水火以剛柔相濟然後克得其和能為民用若使金與金相忤火與火相爛則燋然摧折俱不得其所也今青州天性峭急迷于目前曲直是非昭然可見仁君智數弘大綽有餘裕當以大包小以優容劣歸是于此乃道教之和義士之行也縱不能爾有難忍之忿且當先除曹操以卒先公之恨事定之後乃議兄弟之怨使記注之士定曲直之評不亦上策邪且初天下起兵以尊門為主是以衆寡喁喁莫不樂袁氏之大也今雖分裂有存有亡嚮然景附未有革心若仁君兄弟能悔前之謬留神遠圖克己復禮以從所歡則弱者自以為強危者自以為寧誠欲戮力長驅共獎王室雖亡之日猶存之願則伊周不足參五伯不足六也若使迷而不返遂而不改則戎狄蠻夷將有誚讓之言況我同盟復能戮力為君之役哉則是太公墳壟將有汙池之禍夫人弱小將有滅族之變彼之與此豈可同日而論之哉且行違道以自存猶尚不可況失義以自亡而遺敵之禽哉此韓盧東郭自困于前而遺田父之獲也昔齊公孫竈卒晏子知子期之不免也故曰二惠競爽猶可又弱一箇姜氏危哉表與劉左將軍及北海孫公佑共說此事未嘗不痛心入骨相為悲傷也今整勒士馬憤踊鶴立冀聞和同之聲約一舉之期故復遣信并與青州書若其泰也則袁族其與漢升降乎若其否也則同盟永無望矣臨書愴恨不知所言劉表頓首章樵注本古文苑十韓元吉本無又見後漢書袁紹傳注引魏氏春秋章懷云書見王粲集又見魏志袁紹傳注引魏氏春秋並有刪節為荀彧與孫權檄故使周曜管容李恕張涉陳光勳之徒將帥戰士就渤海七八百里陰習舟楫四年之內無日休解今皆擊櫂若飛回柁若環者也北堂書鈔一百三十七又一百三十八
